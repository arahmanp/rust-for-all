<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta id="meta-desc" name="description" content="Rust for All — Material">
  <title id="page-title">Loading — Rust for All</title>

  <!-- Prevent FOUC -->
  <script>
    (function () {
      var s = localStorage.getItem('rfa-theme');
      var t = (s && s !== 'auto') ? s : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-bs-theme', t);
    })();
  </script>

  <!-- Prism syntax highlighting (dark theme compatible) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">

  <link rel="icon" type="image/x-icon" href="assets/logo/Rust for All.ico">
  <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/icons/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── NAVBAR ──────────────────────────────────────────────────── -->
  <nav class="site-nav" aria-label="Main navigation">
    <div class="container">
      <a class="brand" href="index.html" aria-label="Rust for All — Home">
        <img src="assets/logo/Rust for All.png" alt="Rust for All" class="brand-logo">
      </a>
      <button id="theme-toggle" class="btn-theme" title="Switch to dark mode" aria-label="Switch to dark mode">
        <i class="bi bi-moon" aria-hidden="true"></i>
      </button>
    </div>
  </nav>

  <!-- ── BREADCRUMB / BACK BAR ────────────────────────────────────── -->
  <div class="breadcrumb-bar" aria-label="Breadcrumb">
    <div class="container d-flex align-items-center gap-1">
      <a href="index.html">
        <i class="bi bi-house" aria-hidden="true"></i> Home
      </a>
      <span class="breadcrumb-sep" aria-hidden="true">/</span>
      <a href="index.html#chapters" id="breadcrumb-home-link">Chapters</a>
      <span class="breadcrumb-sep" aria-hidden="true">/</span>
      <a href="#" id="breadcrumb-chapter-link">Chapter</a>
      <span class="breadcrumb-sep" aria-hidden="true">/</span>
      <span id="breadcrumb-current" style="color:var(--text-secondary);">…</span>
    </div>
  </div>

  <!-- ── MATERIAL TOPBAR ─────────────────────────────────────────── -->
  <div class="material-topbar">
    <div class="container">
      <a href="#" id="back-btn" class="btn-ghost">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
        <span id="back-btn-text">Back to Chapter</span>
      </a>
    </div>
  </div>

  <!-- ── MAIN CONTENT ─────────────────────────────────────────────── -->
  <div class="material-layout">
    <div class="container">
      <div class="row">

        <!-- Left: Markdown content -->
        <div class="col-lg-8 material-content-col">

          <!-- Loading state -->
          <div id="content-loading" class="loading-spinner">
            <div class="spinner-ring" aria-hidden="true"></div>
            <p>Loading content…</p>
          </div>

          <!-- Rendered markdown -->
          <article id="content-area" class="md-content" aria-live="polite" style="display:none;">
            <!-- Populated by material.js -->
          </article>

        </div>

        <!-- Right: "On this page" TOC -->
        <aside class="col-lg-4 toc-col" id="toc-col" aria-label="On this page">
          <div class="toc-sticky">
            <div class="toc-heading" id="toc-heading" role="button" tabindex="0" aria-expanded="true">
              On this page
            </div>
            <div class="toc-divider" aria-hidden="true"></div>
            <ul class="toc-list" id="toc-list" role="list">
              <!-- Populated by material.js -->
            </ul>
          </div>
        </aside>

      </div>
    </div>
  </div>

  <!-- ── BOTTOM NAVIGATION ────────────────────────────────────────── -->
  <nav class="material-nav" aria-label="Lesson navigation">
    <div class="container">
      <div class="material-nav-inner">

        <!-- Always occupies the left grid cell; button shown/hidden inside -->
        <div class="nav-prev-wrapper">
          <a href="#" id="prev-btn" class="nav-btn-prev" aria-label="Previous lesson" style="display:none;">
            <i class="bi bi-arrow-left" aria-hidden="true"></i>
            <span>
              <span class="nav-btn-label">Previous</span>
              <span class="nav-btn-title" id="prev-title">—</span>
            </span>
          </a>
        </div>

        <a href="#" id="chapter-btn" class="nav-btn-chapter" aria-label="Back to chapter">
          <i class="bi bi-grid-3x3-gap" aria-hidden="true"></i>
          <span id="chapter-btn-label">Back to Chapter</span>
        </a>

        <!-- Always occupies the right grid cell; button shown/hidden inside -->
        <div class="nav-next-wrapper">
          <a href="#" id="next-btn" class="nav-btn-next" aria-label="Next lesson" style="display:none;">
            <span>
              <span class="nav-btn-label">Next</span>
              <span class="nav-btn-title" id="next-title">—</span>
            </span>
            <i class="bi bi-arrow-right" aria-hidden="true"></i>
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- ── FOOTER ───────────────────────────────────────────────────── -->
  <footer class="site-footer">
    <div class="container">
      <p>
        &copy; 2026 Andhika Rahman. Code licensed under MIT. Content adapted from
        <a href="https://doc.rust-lang.org/book/" target="_blank" rel="noopener noreferrer">The Rust Programming Language</a>
        (<a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener noreferrer">MIT</a> / <a href="https://www.apache.org/licenses/LICENSE-2.0" target="_blank" rel="noopener noreferrer">Apache 2.0</a>).
      </p>
    </div>
  </footer>

  <!-- ── SCRIPTS ─────────────────────────────────────────────────── -->
  <script src="assets/jquery.min.js"></script>
  <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
  <!-- marked.js for client-side markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <!-- Prism language components -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/material.js"></script>
</body>
</html>
